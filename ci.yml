name: CI
on:
  push:
  pull_request:
jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 20
      # npm install (not npm ci) — no committed package-lock.json yet.
      - run: npm install
      - run: npm test
      - name: Accuracy report (eval)
        run: npm run eval
      - name: Upload accuracy report
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: accuracy-report
          path: eval/report.md
